<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            min-height: 100vh;
        }

        .navbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color:#fff;
        }

        .navbar h2 {
            font-weight:700;
        }

        .logout-btn {
            padding:8px 15px;
            border:none;
            border-radius:8px;
            background:#ff4d4d;
            color:#fff;
            cursor:pointer;
            transition:0.3s;
        }

        .logout-btn:hover {
            background:#cc0000;
        }

        .container {
            padding:40px;
            text-align:center;
            color:#fff;
        }

        .welcome {
            font-size:28px;
            font-weight:600;
            margin-bottom:30px;
        }

        .cards {
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .card {
            background:#fff;
            color:#333;
            width:250px;
            padding:25px;
            border-radius:16px;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card h3 {
            margin-bottom:10px;
        }

        .card p {
            font-size:14px;
            color:#666;
        }

        @media(max-width:768px){
            .cards {
                flex-direction:column;
                align-items:center;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>Employee Dashboard</h2>
        <form th:action="@{/logout}" method="get">
            <button class="logout-btn">Logout</button>
        </form>
    </div>

    <!-- Content -->
    <div class="container">
        <div class="welcome">
            Welcome, <span>Employee</span> 👋
        </div>

        <div class="cards">
            
            <div class="card">
                <h3>Profile</h3>
                <p>View and update your profile details.</p>
            </div>

            <div class="card">
                <h3>Employees</h3>
                <p>Check all employee records.</p>
            </div>

            <div class="card">
                <h3>Settings</h3>
                <p>Manage your account settings.</p>
            </div>

        </div>
    </div>

</body>
</html>
